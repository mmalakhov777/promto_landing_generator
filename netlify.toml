[build]
  publish = "dist"
  command = "npm run build"

# Redirect multiple trailing slashes to clean URL
[[redirects]]
  from = "/index.html"
  to = "/"
  status = 301
  force = true

[[redirects]]
  from = "/index.php"
  to = "/"
  status = 301
  force = true

[[redirects]]
  from = "/index.php/*"
  to = "/:splat"
  status = 301
  force = true

# Clean URLs - remove double trailing slashes
[[redirects]]
  from = "/*//"
  to = "/:splat"
  status = 301
  force = true

# Clean URLs - remove trailing slashes
[[redirects]]
  from = "/*/"
  to = "/:splat"
  status = 301
  force = true

# Custom 404
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
